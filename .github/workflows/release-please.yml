name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # npm publishing is intentionally not wired up yet (internal tool).
      # To publish on release: add an NPM_TOKEN secret and a job here that
      # checks out, `npm ci && npm run build`, then
      # `npm publish --access public --provenance` guarded by
      # `if: ${{ steps.release.outputs.release_created }}`.
