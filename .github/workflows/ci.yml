name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Generated skill must be current
        run: npx tsx scripts/build-skill.ts --check

  bench-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: bench/package-lock.json

      - run: npm ci
        working-directory: bench
      - run: npx tsc --noEmit
        working-directory: bench
      - run: npx vitest run test
        working-directory: bench
