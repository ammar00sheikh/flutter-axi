name: publish

# Manual npm publish of the version currently in package.json.
# Normal releases publish automatically via release-please.yml; this is the
# escape hatch for catch-up publishes or re-publishing after a failed run.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish if this version is not already on npm
        run: |
          set -eu
          version=$(node -p "require('./package.json').version")
          if npm view "flutter-axi@${version}" version >/dev/null 2>&1; then
            echo "flutter-axi@${version} is already on npm; nothing to do."
            exit 0
          fi
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
